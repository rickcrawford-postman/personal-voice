name: Package skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create .skill package
        run: |
          mkdir -p dist
          rm -f dist/personal-voice.skill
          zip -r dist/personal-voice.skill SKILL.md references/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: personal-voice-skill
          path: dist/personal-voice.skill
          if-no-files-found: error

      - name: Publish rolling latest release
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest dist/personal-voice.skill --clobber
          else
            gh release create latest dist/personal-voice.skill \
              --title "Latest build" \
              --notes "Automated skill package from CI." \
              --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach to tagged release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" dist/personal-voice.skill --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
